name: Build, Scan, and Push

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: |
          docker build -t ghcr.io/westerncoastal/stream-stack/ssai:latest ./ssai

      - name: Push image
        run: |
          docker push ghcr.io/westerncoastal/stream-stack/ssai:latest

      - name: Scan image
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: ghcr.io/westerncoastal/stream-stack/ssai:latest
          severity: CRITICAL,HIGH
          exit-code: 1
