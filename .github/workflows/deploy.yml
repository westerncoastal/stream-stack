name: Build, Scan, and Push

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      # 📥 Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 🟢 Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 📦 Generate package-lock.json if missing
      - name: Generate lockfile if missing
        run: |
          cd ssai
          if [ ! -f package-lock.json ]; then
            echo "No lockfile found. Generating..."
            npm install
          else
            echo "Lockfile already exists."
          fi

      # 💾 Commit lockfile (only if created)
      - name: Commit package-lock.json
        run: |
          cd ssai
      
          git config user.name "github-actions"
          git config user.email "actions@github.com"
      
          git add package-lock.json
      
          git commit -m "auto-add package-lock.json" || echo "No changes"
      
          git pull --rebase origin main || true
      
          git push origin HEAD:main

      # 🔐 Login to GHCR
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # 🐳 Build image
      - name: Build SSAI Image
        run: |
          docker build \
            -t ghcr.io/westerncoastal/stream-stack/ssai:latest \
            ./ssai

      # 📦 Push image
      - name: Push SSAI Image
        run: |
          docker push ghcr.io/westerncoastal/stream-stack/ssai:latest

      # 🔒 Scan container image
      - name: Scan container image
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: ghcr.io/westerncoastal/stream-stack/ssai:latest
          severity: HIGH
          exit-code: 1

      # 📦 Repomix
      - name: Pack repo
        uses: yamadashy/repomix/.github/actions/repomix@main
        with:
          output: repomix-output.xml
          compress: true
