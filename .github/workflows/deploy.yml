name: Build, Scan, and Push

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔐 Login to GHCR
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # 🐳 Build SSAI image
      - name: Build SSAI Image
        run: |
          docker build -t ghcr.io/westerncoastal/stream-stack/ssai:latest ./ssai

      # 📦 Push image
      - name: Push SSAI Image
        run: |
          docker push ghcr.io/westerncoastal/stream-stack/ssai:latest

      # 🔒 Security scan
      - name: Scan vulnerabilities
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: fs
          severity: CRITICAL,HIGH

      # 📦 Repomix
      - name: Pack repo
        uses: yamadashy/repomix/.github/actions/repomix@main
        with:
          output: repomix-output.xml
          compress: true
