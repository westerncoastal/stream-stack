version: "3.9"

services:
  streaming:
    image: bluenviron/mediamtx:latest-alpine
    container_name: streaming
    ports:
      - "1935:1935"
      - "8888:8888"
    volumes:
      - ./hls:/hls
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  ssai:
    image: node:20-alpine
    container_name: ssai
    working_dir: /app
    volumes:
      - ./ssai:/app
      - ./hls:/hls
      - ./ads:/ads
    environment:
      - SERVER_IP=${SERVER_IP}
    command: >
      sh -c "apk add --no-cache python3 py3-pip streamlink && 
             npm install && 
             node server.js"
    ports:
      - "4000:4000"
    deploy:
      resources:
        limits:
          memory: 200M
    restart: unless-stopped

  revive-db:
    image: mariadb:10.6
    environment:
      MYSQL_DATABASE: revive
      MYSQL_USER: revive
      MYSQL_PASSWORD: revive_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - ./mysql:/var/lib/mysql
    deploy:
      resources:
        limits:
          memory: 150M

  revive:
    image: reviveadserver/revive-adserver:latest
    ports:
      - "8081:80"
    depends_on:
      - revive-db
    volumes:
      - ./revive_conf:/var/www/html/var
    deploy:
      resources:
        limits:
          memory: 180M
    restart: unless-stopped
