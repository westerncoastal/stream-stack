version: "3.9"

services:
  streaming:
    image: bluenviron/mediamtx
    container_name: streaming
    ports:
      - "1935:1935"   # RTMP
      - "8888:8888"   # HLS
      - "8890:8890"   # WebRTC
    volumes:
      - ./mediamtx.yml:/mediamtx.yml
    restart: unless-stopped

  ssai:
    image: node:20
    working_dir: /app
    volumes:
      - ./ssai:/app
      - ./hls:/hls
    command: sh -c "npm install && node server.js"
    ports:
      - "4000:4000"
    restart: unless-stopped

  prebid:
    image: prebid/prebid-server
    ports:
      - "8000:8000"
    restart: unless-stopped

  revive:
    image: reviveadserver/revive-adserver
    ports:
      - "8081:80"
    restart: unless-stopped

  analytics:
    image: posthog/posthog
    ports:
      - "9000:8000"
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    restart: unless-stopped
