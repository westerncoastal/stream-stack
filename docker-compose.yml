version: "3.9"

services:
  rtmp:
    image: alfg/nginx-rtmp
    container_name: rtmp
    ports:
      - "1935:1935"
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./hls:/tmp/hls
    restart: unless-stopped

  ssai:
    image: node:20
    container_name: ssai
    working_dir: /app
    volumes:
      - ./ssai:/app
      - ./ads:/ads
      - ./hls:/hls
    command: sh -c "npm install && node server.js"
    ports:
      - "4000:4000"
    restart: unless-stopped

  revive:
    image: reviveadserver/revive-adserver
    container_name: revive
    ports:
      - "8081:80"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    container_name: grafana
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  grafana-data:
