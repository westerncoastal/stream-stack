version: "3.9"

services:
  rtmp:
    image: alfg/nginx-rtmp
    ports:
      - "1935:1935"
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./hls:/tmp/hls
    restart: unless-stopped

  revive:
    image: reviveadserver/revive-adserver
    ports:
      - "8081:80"
    restart: unless-stopped

  ssai:
    image: node:20
    working_dir: /app
    volumes:
      - ./ssai:/app
      - ./ads:/ads
      - ./hls:/hls
    command: node server.js
    ports:
      - "4000:4000"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    restart: unless-stopped
